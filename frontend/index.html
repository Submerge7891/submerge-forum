<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submerge 讨论区</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- 加载动画容器 -->
    <div class="loader-container" id="pageLoader">
        <div class="dot-jump-loader">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
        <p class="loader-text">Loading now......</p>
    </div>

    <!-- 导航栏 -->
    <header>
        <div class="container header-main">
            <div class="logo">Submerge <span>讨论区</span></div>
            <div class="nav">
                <a href="#" class="active" data-page="home">首页</a>
                <a href="#" data-page="essence">精华</a>
                <a href="#" data-page="category">分类</a>
                <a href="#" data-page="chat">聊天</a>
                <a href="#" data-page="about">关于</a>
            </div>
            <div class="user-info">
                <div id="auth-buttons">
                    <a href="#" id="login-btn">登录</a>
                    <a href="#" id="register-btn">注册</a>
                </div>
                <div id="user-profile" style="display: none;">
                    <span class="avatar-small" id="user-avatar">U</span>
                    <span id="user-name">用户名</span>
                    <span class="msg-icon" id="msg-icon">
                        <i class="bi bi-envelope"></i>
                        <span class="msg-badge" id="msg-badge" style="display: none;">0</span>
                    </span>
                    <a href="#" id="logout-btn">退出</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 主要内容容器 -->
    <div class="container">
        <main>
            <div class="main-content" id="main-content">
                <!-- 动态加载页面内容 -->
            </div>
            <div class="sidebar">
                <div class="side-card">
                    <div class="side-title">讨论区统计</div>
                    <div class="stat-item">总帖子数 <span class="stat-num" id="total-posts">0</span></div>
                    <div class="stat-item">今日发帖 <span class="stat-num" id="today-posts">0</span></div>
                    <div class="stat-item">注册用户 <span class="stat-num" id="total-users">0</span></div>
                    <div class="stat-item">在线人数 <span class="stat-num" id="online-count">0</span></div>
                </div>
                <div class="side-card">
                    <div class="side-title">热门标签</div>
                    <div class="tags-group" id="hot-tags"></div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <div class="container">
            © 2026 Submerge 讨论区
        </div>
    </footer>

    <div class="create-post-btn" id="create-post-btn">
        <i class="bi bi-plus"></i>
    </div>

    <!-- 各种模态框（与之前类似，但需加入聊天相关） -->
    <!-- 为简化，此处省略，实际应包含：登录、注册、发帖、帖子详情、聊天列表、聊天窗口等 -->
    <!-- 由于篇幅，此处只给出骨架，具体内容需要根据 script.js 渲染 -->

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
